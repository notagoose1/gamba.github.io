<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaCasino • Fake Money Casino</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SUPACASINO</div>
        <div class="nav-games">
            <button onclick="switchGame('hilo')">HiLo</button>
            <button onclick="switchGame('roulette')">Roulette</button>
            <button onclick="switchGame('mines')">Mines</button>
            <button onclick="switchGame('plinko')">Plinko</button>
            <button onclick="switchGame('blackjack')">Blackjack</button>
        </div>
        <div class="user-hub" id="user-hub">
            <span class="xp-badge" id="user-xp">XP: 0</span>
            <span class="balance-tag">$<span id="user-balance">1000</span></span>
        </div>
    </nav>

    <main class="casino-floor">
        <div id="game-container"></div>

        <aside class="leaderboard">
            <h3>🏆 High Rollers</h3>
            <div id="leaderboard-data"></div>
        </aside>
    </main>

    <script src="js/casino.js"></script>
    <script src="js/app.js"></script>
    <script src="js/hilo.js"></script>
    <script src="js/roulette.js"></script>
    <script src="js/mines.js"></script>
    <script src="js/plinko.js"></script>
    <script src="js/blackjack.js"></script>

    <script>
        window.onload = () => {
            Casino.init();
            switchGame('hilo');
        };
    </script>
</body>
</html>
