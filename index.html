<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaBet | Simulation Gambling</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: var(--gold); color: black; border: none; padding: 12px 24px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; width: 100%; margin: 5px 0; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .balance-display { font-size: 2rem; color: var(--gold); margin: 10px 0; }
        table { width: 100%; max-width: 600px; border-collapse: collapse; margin-top: 20px; background: var(--card); }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        th { color: var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>SupaBet Casino</h1>

    <!-- Auth Section -->
    <div id="auth-section" class="card">
        <h3>Join the Game</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <input type="text" id="username" placeholder="Username (for leaderboard)">
        <button onclick="handleSignUp()">Sign Up</button>
        <button onclick="handleLogin()" style="background: #444; color: white;">Login</button>
    </div>

    <!-- Game Section -->
    <div id="game-section" class="card hidden">
        <h3>Welcome, <span id="display-name">User</span>!</h3>
        <div class="balance-display">$<span id="balance-amount">0</span></div>
        <input type="number" id="bet-amount" placeholder="Bet Amount" min="1">
        <button onclick="playGame(2)">Double or Nothing (2x)</button>
        <button onclick="handleLogout()" style="background: #ff4444; margin-top: 20px;">Logout</button>
    </div>

    <!-- Leaderboard Section -->
    <h3>Global Leaderboard</h3>
    <table>
        <thead>
            <tr><th>Rank</th><th>Player</th><th>Balance</th></tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://bnewlzfxazyvcqdwlzzg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuZXdsemZ4YXp5dmNxZHdsenpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDkxNTIsImV4cCI6MjA5NDA4NTE1Mn0.4FqiWgVVKmKu8sZnhpVXYCH-mzW2ZYait2WDBrXp218';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // --- AUTH LOGIC ---
        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            
            const { data, error } = await _supabase.auth.signUp({
                email, password, options: { data: { username } }
            });

            if (error) alert(error.message);
            else alert("Check your email for confirmation!");
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            
            if (error) alert(error.message);
            else checkUser();
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('game-section').classList.remove('hidden');
                document.getElementById('display-name').innerText = user.user_metadata.username;
                fetchUserData();
            }
            updateLeaderboard();
        }

        // --- DATA LOGIC ---
        async function fetchUserData() {
            const { data, error } = await _supabase
                .from('profiles')
                .select('balance')
                .eq('id', currentUser.id)
                .single();
            
            if (data) document.getElementById('balance-amount').innerText = data.balance;
        }

        async function updateLeaderboard() {
            const { data, error } = await _supabase
                .from('profiles')
                .select('username, balance')
                .order('balance', { ascending: false })
                .limit(10);

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = data.map((u, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${u.username || 'Anon'}</td>
                    <td>$${u.balance}</td>
                </tr>
            `).join('');
        }

        // --- GAME LOGIC ---
        async function playGame(multiplier) {
            const betInput = document.getElementById('bet-amount');
            const bet = parseInt(betInput.value);
            const currentBalance = parseInt(document.getElementById('balance-amount').innerText);

            if (isNaN(bet) || bet <= 0 || bet > currentBalance) {
                alert("Invalid bet amount!");
                return;
            }

            const win = Math.random() > 0.5;
            const newBalance = win ? currentBalance + (bet * (multiplier - 1)) : currentBalance - bet;

            const { error } = await _supabase
                .from('profiles')
                .update({ balance: newBalance })
                .eq('id', currentUser.id);

            if (!error) {
                alert(win ? `You WON $${bet}!` : `You LOST $${bet}!`);
                fetchUserData();
                updateLeaderboard();
            } else {
                alert("Database error. Transaction cancelled.");
            }
        }

        // Initialize
        checkUser();
    </script>
</body>
</html>
